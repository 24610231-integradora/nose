<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear cuenta</title>
  <style>
    body { font-family: Arial; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh; }
    form { background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1); width:300px; }
    input, button { width:100%; padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:5px; }
    button { background:#007BFF; color:white; border:none; cursor:pointer; }
    button:hover { background:#0056b3; }
  </style>
</head>
<body>
  <form id="formRegistro">
    <h2>Crear cuenta</h2>
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="email" id="email" placeholder="Correo electrónico" required>
    <input type="password" id="password" placeholder="Contraseña" required>
    <button type="submit">Registrar</button>
  </form>

  <script>
    const form = document.getElementById('formRegistro');
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      localStorage.setItem('nombre', document.getElementById('nombre').value);
      localStorage.setItem('email', document.getElementById('email').value);
      localStorage.setItem('password', document.getElementById('password').value);
      window.location.href = "hola.html";
    });
  </script>
</body>
</html>
